<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DUBIOUS CODE LAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --panel: #0d0d12;
            --text: #ffffff;
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --dyslexia-font: 'Space Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--dyslexia-font);
            padding: 2rem;
        }

        .lab-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 { border-bottom: 2px solid var(--neon-blue); padding-bottom: 10px; margin-bottom: 30px; }

        /* Subject Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        .card {
            background: var(--panel);
            border: 2px solid #1e1e2e;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--neon-green); transform: translateY(-5px); }

        .tag {
            font-size: 0.7rem;
            background: rgba(0, 210, 255, 0.1);
            color: var(--neon-blue);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .code-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #ccc;
            border-left: 3px solid var(--neon-green);
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--neon-blue);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="lab-container">
    <h1>CODING_LAB // LEVEL_01</h1>
    
    <div class="grid">
        <div class="card">
            <span class="tag">WEB STRUCTURE</span>
            <h3>HTML5</h3>
            <p>The skeleton of the internet.</p>
            <div class="code-box">
                &lt;button&gt;Click Me&lt;/button&gt;
            </div>
            <a href="#" class="btn">START LESSON</a>
        </div>

        <div class="card">
            <span class="tag">GAME ENGINE</span>
            <h3>C++</h3>
            <p>The power behind Dubious Games.</p>
            <div class="code-box">
                std::cout << "Hello World";
            </div>
            <a href="#" class="btn">START LESSON</a>
        </div>

        <div class="card">
            <span class="tag">AUTOMATION</span>
            <h3>PYTHON</h3>
            <p>Perfect for Discord bots and logic.</p>
            <div class="code-box">
                print("Bot Active")
            </div>
            <a href="#" class="btn">START LESSON</a>
        </div>
    </div>
</div>

</body>
</html>
